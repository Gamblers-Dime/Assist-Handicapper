<body>

<div class="phone">

<script>
const COV = {
  pgAst_teamAst:0.84, pgAst_oppDefRtg:-0.72, pgAst_coachPace:0.68,
  pgAst_homeAway:0.52, pgAst_l5Trend:0.58, pgTo_backToBack:0.47,
  teamAst_offRtg:0.79, pgAst_rivalry:-0.22, pgAst_pgUsage:0.63,
  pgAst_minutesTrend:0.71, pgAst_h2hHistory:0.66, pgAst_altitude:-0.18,
  pgTo_oppStealPct:0.61,
};
const DEF_SYS = {
  DROP_COVERAGE:{astMult:1.12,toMult:0.95,coverPct:64.2},
  ZONE_23:{astMult:1.18,toMult:0.98,coverPct:66.1},
  AGGRESSIVE_HELP:{astMult:1.08,toMult:1.05,coverPct:61.3},
  FUNDAMENTAL:{astMult:0.94,toMult:1.02,coverPct:57.4},
  HYBRID_ZONE:{astMult:1.05,toMult:1.03,coverPct:59.8},
  PHYSICAL_PRESSURE:{astMult:0.90,toMult:1.14,coverPct:52.1},
  SWITCH_EVERYTHING:{astMult:0.87,toMult:1.08,coverPct:54.0},
};
const STYLE_ADJ = {
  SPEED_VS_PHYSICAL:0.8, PASS_FIRST_VS_ISO:1.2,
  SHOOTER_VS_DISRUPTOR:-0.6, MIRROR_MATCHUP:0.0,
  SIZE_ADVANTAGE:0.5, NEUTRAL:0.0,
};

function avg(arr,n){const s=n?arr.slice(-n):arr;return s.reduce((a,b)=>a+b,0)/s.length;}
function slope(arr){const n=arr.length;if(n<3)return 0;const mx=(n-1)/2,my=avg(arr);const num=arr.reduce((s,y,x)=>s+(x-mx)*(y-my),0);const den=arr.reduce((s,_,x)=>s+(x-mx)**2,0);return den?num/den:0;}
function bayesian(sa,l10){return 0.35*sa+0.40*avg(l10)+0.25*avg(l10.slice(-5));}
function monteCarlo(proj,sd,n=5000){const s=[];for(let i=0;i<n;i++){const u1=Math.random(),u2=Math.random();const z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);s.push(proj+z*sd);}s.sort((a,b)=>a-b);return[+(s[Math.floor(n*.05)].toFixed(1)),+(s[Math.floor(n*.95)].toFixed(1))];}
function kelly(wp,odds,f=0.25){const d=odds<0?1+100/Math.abs(odds):1+odds/100;const b=d-1,q=1-wp,k=(b*wp-q)/b;return Math.max(0,Math.min(k*f,0.15));}
function winProb(proj,line,sd){return 1/(1+Math.exp(-1.7*(proj-line)/sd));}

function predict(ctx) {
  const bp = bayesian(ctx.seasonPGAst, ctx.l10Ast);
  const factors = [];
  const tAdj = slope(ctx.l5Ast)*0.8;
  factors.push({name:'L5 Trend',val:avg(ctx.l5Ast).toFixed(1),adj:tAdj,w:'22%',signal:tAdj>0.3?'BULL':tAdj<-0.3?'BEAR':'NEUT'});
  const dAdj=(113.4-ctx.oppDefRtg)*(COV.pgAst_oppDefRtg*-0.12);
  factors.push({name:'Opp DefRtg',val:ctx.oppDefRtg,adj:dAdj,w:'18%',signal:dAdj>0?'BULL':'BEAR'});
  const pAdj=(ctx.coachPace-100.8)*0.07;
  factors.push({name:'Coach Pace',val:ctx.coachPace,adj:pAdj,w:'14%',signal:pAdj>0.2?'BULL':pAdj<-0.2?'BEAR':'NEUT'});
  const hAdj=(ctx.isHome?0.70:-0.35)*COV.pgAst_homeAway;
  factors.push({name:'Home Court',val:ctx.isHome?'Home':'Away',adj:hAdj,w:'9%',signal:ctx.isHome?'BULL':'NEUT'});
  const h2hAdj=ctx.h2hAst.length>2?(avg(ctx.h2hAst)-ctx.seasonPGAst)*COV.pgAst_h2hHistory:0;
  factors.push({name:'H2H History',val:avg(ctx.h2hAst).toFixed(1),adj:h2hAdj,w:'11%',signal:h2hAdj>0.3?'BULL':h2hAdj<-0.3?'BEAR':'NEUT'});
  const tAdj2=(ctx.teamAstPct-0.62)*4.5*0.5;
  factors.push({name:'Team AST%',val:(ctx.teamAstPct*100).toFixed(0)+'%',adj:tAdj2,w:'13%',signal:ctx.teamAstPct>0.65?'BULL':ctx.teamAstPct<0.58?'BEAR':'NEUT'});
  const uAdj=(ctx.pgUsageRate-0.26)*3.2*0.4;
  factors.push({name:'Usage Rate',val:(ctx.pgUsageRate*100).toFixed(0)+'%',adj:uAdj,w:'7%',signal:uAdj>0.3?'BULL':'NEUT'});
  const mAdj=(ctx.minutesTrend-32)*0.08;
  factors.push({name:'Minutes',val:ctx.minutesTrend,adj:mAdj,w:'6%',signal:mAdj>0.2?'BULL':'NEUT'});

  const ds = DEF_SYS[ctx.coachDefSystem];
  const sa = STYLE_ADJ[ctx.pgVsPGStyleMatchup]||0;
  let sit=0;
  const warns=[];
  if(ctx.backToBack){sit-=0.6;warns.push('B2B -0.6');}
  if(ctx.injuryFlag){sit-=1.1;warns.push('Injury -1.1');}
  if(ctx.altitude){sit-=0.4;warns.push('Denver -0.4');}
  if(ctx.rivalry)sit-=0.3;
  if(ctx.restDays>=3)sit+=0.5;
  const stealAdj=ctx.oppPGStealPct>0.025?-(ctx.oppPGStealPct-0.018)*80:0;

  const factorSum=factors.reduce((s,f)=>s+f.adj,0);
  const base=bp+factorSum;
  const final=+((base*ds.astMult+sa+sit+stealAdj).toFixed(1));
  const sd=ctx.seasonPGAst*0.28;
  const [mcL,mcH]=monteCarlo(final,sd);
  const dir=final>=ctx.lineValue?'OVER':'UNDER';
  const wp=dir==='OVER'?winProb(final,ctx.lineValue,sd):1-winProb(final,ctx.lineValue,sd);
  const edge=+((final-ctx.lineValue)/ctx.lineValue*100).toFixed(1);
  const kpct=+(kelly(wp,ctx.odds)*100).toFixed(1);
  const conf=Math.min(98,Math.round(50+(wp-0.5)*100+ds.coverPct*0.3));
  let grade='D';
  if(conf>=76&&Math.abs(edge)>=6)grade='A';
  else if(conf>=70&&Math.abs(edge)>=4)grade='B';
  else if(conf>=65&&Math.abs(edge)>=2)grade='C';
  if(ctx.injuryFlag&&grade==='A')grade='B';
  return {projection:final,confidence:conf,direction:dir,edgePct:edge,kellyPct:kpct,winProb:wp,mcRange:[mcL,mcH],factors,grade,situAdj:sit,bayesProj:+(bp.toFixed(1)),warnings:warns};
}

function addToSlip(idx){
  const ctx=PG_CONTEXTS[idx];
  const res=RESULTS[idx].result;
  const slip=getSlip();
  if(slip.find(s=>s.player===ctx.player)){showToast('Already in slip');return;}
  const br=getBankroll();
  const stake=Math.max(5,Math.min(+(br*res.kellyPct/100).toFixed(0),getSettings().maxSingleBet));
  slip.push({player:ctx.player,team:ctx.team,matchup:ctx.matchup,
    direction:res.direction,line:ctx.lineValue,odds:ctx.odds,
    grade:res.grade,confidence:res.confidence,edgePct:res.edgePct,
    kellyPct:res.kellyPct,projection:res.projection,stake});
  saveSlip(slip);
  updateSlipBadge();
  showToast(ctx.player+' added to slip \u2713');
}

function updateStake(el,playerName){
  const slip=getSlip();
  const idx=slip.findIndex(s=>s.player===playerName);
  if(idx>=0){slip[idx].stake=parseFloat(el.value)||0;saveSlip(slip);}
}

function promptSettle(id){
  const actual=parseFloat(prompt('Enter actual assists:',''));
  if(!isNaN(actual))settleBet(id,actual);
}

function settleBet(id,actual){
  const bets=getBets();
  const idx=bets.findIndex(b=>b.id===id);
  if(idx<0)return;
  const bet=bets[idx];
  const won=(bet.direction==='OVER'&&actual>bet.line)||(bet.direction==='UNDER'&&actual<bet.line);
  const decOdds=bet.odds<0?1+100/Math.abs(bet.odds):1+bet.odds/100;
  const pnl=won?+(bet.stake*(decOdds-1)).toFixed(2):-bet.stake;
  bets[idx]={...bet,status:won?'WON':'LOST',actualResult:actual,pnl,settledAt:Date.now()};
  saveBets(bets);
  const br=getBankroll();
  saveBankroll(+(br+pnl).toFixed(2));
  renderCurrentTab();
}

function placeAllBets(){
  const slip=getSlip();
  if(!slip.length){showToast('Slip is empty');return;}
  const s=getSettings();
  let br=getBankroll();
  const bets=getBets();
  let placed=0;
  for(const item of slip){
    const stake=Math.min(item.stake||10,s.maxSingleBet,br);
    if(stake<=0)continue;
    bets.push({
      id:Date.now()+Math.random(),
      player:item.player,team:item.team,matchup:item.matchup,
      direction:item.direction,line:item.line,odds:item.odds,
      stake,grade:item.grade,confidence:item.confidence,
      edgePct:item.edgePct,kellyPct:item.kellyPct,
      status:'PENDING',placedAt:Date.now(),pnl:0,
    });
    br-=stake;
    placed++;
  }
  saveBets(bets);
  saveBankroll(+br.toFixed(2));
  saveSlip([]);
  showToast(placed+' bet'+(placed!==1?'s':'')+' placed \u2713');
  renderCurrentTab();
}

  let html='<div class="bankroll-bar"><div class="br-lbl">BANKROLL</div><div class="br-amt">$'+br.toFixed(2)+'</div></div>';

  if(slip.length>0){
    html+='<div class="sec-title">Current Slip ('+slip.length+')</div>';
    slip.forEach(item=>{
      const dirClass=item.direction==='OVER'?'dir-over':'dir-under';
      const oddsStr=item.odds<0?String(item.odds):'+'+item.odds;
      const safePlayer=item.player.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+='<div class="slip-card">'
        +'<div class="slip-card-top">'
          +'<div>'
            +'<div class="slip-player">'+item.player+'</div>'
            +'<div class="slip-meta">'+item.matchup+' \u00b7 AST</div>'
          +'</div>'
          +'<div class="grade-chip grade-'+item.grade+'">'+item.grade+'</div>'
        +'</div>'
        +'<div class="slip-row">'
          +'<span class="slip-dir '+dirClass+'">'+item.direction+' '+item.line+'</span>'
          +'<span class="slip-detail">Conf: '+item.confidence+'% \u00b7 Edge: '+(item.edgePct>=0?'+':'')+item.edgePct+'% \u00b7 Odds: '+oddsStr+'</span>'
        +'</div>'
        +'<div class="slip-row">'
          +'<span class="slip-detail">Proj: '+item.projection+' \u00b7 Kelly: '+item.kellyPct+'%</span>'
          +'<span style="font-size:10px;color:var(--text3);">Stake: $</span>'
          +'<input type="number" class="stake-input" value="'+item.stake+'" min="1" max="500" onchange="updateStake(this,\''+safePlayer+'\')">'
        +'</div>'
      +'</div>';
    });
    html+='<button class="btn-place" onclick="placeAllBets()">PLACE ALL BETS</button>';
  } else {
    html+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">Slip is empty \u2014 add props from the Props tab</div>';
  }

  if(pending.length>0){
    html+='<div class="sec-title">Pending Bets ('+pending.length+')</div>';
    pending.forEach(bet=>{
      const oddsStr=bet.odds<0?String(bet.odds):'+'+bet.odds;
      const safeId=JSON.stringify(bet.id);
      html+='<div class="pending-card">'
        +'<div class="pending-top">'
          +'<div>'
            +'<div class="pending-player">'+bet.player+'</div>'
            +'<div class="pending-meta">'+bet.matchup+' \u00b7 '+bet.direction+' '+bet.line+' \u00b7 Odds '+oddsStr+'</div>'
          +'</div>'
          +'<button class="btn-settle" onclick="promptSettle('+safeId+')">SETTLE</button>'
        +'</div>'
        +'<div class="pending-meta">Stake: $'+bet.stake+' \u00b7 Grade '+bet.grade+' \u00b7 Conf '+bet.confidence+'%</div>'
      +'</div>';
    });
  }

  if(settled.length>0){
    html+='<div class="sec-title">Settled ('+settled.length+')</div>';
    settled.forEach(bet=>{
      const pnlClass=(bet.pnl||0)>=0?'pnl-pos':'pnl-neg';
      const pnl=bet.pnl||0;
      const pnlStr=(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2);
      html+='<div class="settled-card">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;">'
          +'<div>'
            +'<div style="font-size:12px;font-weight:700;color:var(--text);">'+bet.player+' \u2014 '+bet.direction+' '+bet.line+'</div>'
            +'<div style="font-size:10px;color:var(--text3);">Actual: '+bet.actualResult+' AST \u00b7 Stake: $'+bet.stake+'</div>'
          +'</div>'
          +'<div>'
            +'<div class="'+pnlClass+'" style="font-size:14px;">'+pnlStr+'</div>'
            +'<div style="font-size:9px;text-align:right;color:var(--text3);">'+bet.status+'</div>'
          +'</div>'
        +'</div>'
      +'</div>';
    });
  }

  html+='<div class="sec-title">Performance Summary</div>'
    +'<div class="stat-row">'
      +'<div class="stat-box"><div class="sv">'+winRate+'</div><div class="sl">Win Rate</div></div>'
      +'<div class="stat-box"><div class="sv '+(totalPnl>=0?'':'pnl-neg')+'">'+(totalPnl>=0?'+':'')+'\$'+Math.abs(totalPnl).toFixed(2)+'</div><div class="sl">Total P&L</div></div>'
      +'<div class="stat-box"><div class="sv">$'+totalStaked.toFixed(2)+'</div><div class="sl">Total Staked</div></div>'
    +'</div>'
    +'<div class="rg-banner">\uD83D\uDEA8 GAMBLE RESPONSIBLY \u00b7 1-800-522-4700</div>';
  return html;
}

function renderSettings(){
  const s=getSettings();
  const br=getBankroll();
  const grades=s.gradesAllowed||'A,B';
  const gArr=grades.split(',');
  const chk=g=>gArr.includes(g)?'checked':'';
  return '<div class="settings-section">'
    +'<h3>Bankroll</h3>'
    +'<div class="field-row"><label>Current Bankroll ($)</label>'
    +'<input type="number" id="set-bankroll" class="field-input" value="'+br+'" min="0" step="10"></div>'
    +'</div>'
    +'<div class="settings-section">'
    +'<h3>Risk Limits</h3>'
    +'<div class="field-row"><label>Max Single Bet ($)</label><input type="number" id="set-maxsingle" class="field-input" value="'+s.maxSingleBet+'" min="1"></div>'
    +'<div class="field-row"><label>Max Daily Exposure ($)</label><input type="number" id="set-maxdaily" class="field-input" value="'+s.maxDailyExposure+'" min="1"></div>'
    +'</div>'
    +'<div class="settings-section">'
    +'<h3>Algorithm Filters</h3>'
    +'<div class="field-row"><label>Min Confidence (\u226570)</label><input type="number" id="set-minconf" class="field-input" value="'+s.minConfidence+'" min="70" max="98"></div>'
    +'<div class="field-row"><label>Min Edge % (\u22652)</label><input type="number" id="set-minedge" class="field-input" value="'+s.minEdgePct+'" min="2"></div>'
    +'<div class="field-row"><label>Grades Allowed</label>'
    +'<div class="grade-checkboxes">'
    +'<label class="grade-check-item"><input type="checkbox" id="set-gradeA" '+chk('A')+'> A</label>'
    +'<label class="grade-check-item"><input type="checkbox" id="set-gradeB" '+chk('B')+'> B</label>'
    +'<label class="grade-check-item"><input type="checkbox" id="set-gradeC" '+chk('C')+'> C</label>'
    +'<label class="grade-check-item"><input type="checkbox" id="set-gradeD" '+chk('D')+'> D</label>'
    +'</div></div>'
    +'</div>'
    +'<div class="settings-section">'
    +'<h3>Agent</h3>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'
    +'<span style="font-size:12px;color:var(--text2);">Status:</span>'
    +'<span class="status-badge" id="agent-status">IDLE</span>'
    +'</div>'
    +'<button class="btn-scan" onclick="runScan()">\u25b6 RUN SCAN</button>'
    +'</div>'
    +'<div class="settings-section">'
    +'<h3>API</h3>'
    +'<div class="field-row"><label>Odds API Key</label>'
    +'<input type="text" id="set-apikey" class="field-input" placeholder="Enter API key..." value="'+(s.oddsApiKey||'')+'"></div>'
    +'</div>'
    +'<div class="settings-section">'
    +'<h3>Responsible Gambling</h3>'
    +'<p style="font-size:11px;color:var(--text3);line-height:1.6;">Always bet within your means. Set strict limits and never chase losses. If gambling becomes a problem, call the National Problem Gambling Helpline: <strong>1-800-522-4700</strong>.</p>'
    +'</div>'
    +'<button class="btn-save" onclick="saveSettingsForm()">SAVE SETTINGS</button>';
}

function saveSettingsForm(){
  const br=parseFloat(document.getElementById('set-bankroll').value)||1000;
  saveBankroll(br);
  const grades=[];
  ['A','B','C','D'].forEach(g=>{const el=document.getElementById('set-grade'+g);if(el&&el.checked)grades.push(g);});
  const s={
    maxSingleBet:parseFloat(document.getElementById('set-maxsingle').value)||100,
    maxDailyExposure:parseFloat(document.getElementById('set-maxdaily').value)||500,
    minConfidence:parseFloat(document.getElementById('set-minconf').value)||70,
    minEdgePct:parseFloat(document.getElementById('set-minedge').value)||4,
    gradesAllowed:grades.join(','),
    oddsApiKey:document.getElementById('set-apikey').value||'',
  };
  saveSettings(s);
  showToast('Settings saved \u2713');
}

function runScan(){
  const badge=document.getElementById('agent-status');
  if(badge){badge.innerHTML='<span class="spinner"></span>SCANNING...';badge.style.background='var(--blue-p)';badge.style.color='var(--blue)';}
  setTimeout(()=>{
    if(badge){badge.textContent='IDLE';badge.style.background='';badge.style.color='';}
    showToast('Scan complete \u2014 props updated');
    setTab(0);
  },1500);
}

let currentTab=0;
const TAB_HEADERS=[
  {t:'\uD83C\uDFAF PG Props \u2014 Mar 18',s:'DRAFTKINGS LINES \u00b7 ALGORITHM RANKED',b:'6 Props'},
  {t:"\uD83C\uDFC0 Tonight's Slate",        s:'MAR 18 2026 \u00b7 6 GAMES',             b:'6 Games'},
  {t:'\u2699\uFE0F Prediction Model',       s:'13-FACTOR BAYESIAN REGRESSION',           b:'v3.0'},
  {t:'\uD83D\uDCCA Backtest Results',       s:'2015\u20132026 \u00b7 3,212 SIMULATED BETS',b:'59.5%'},
  {t:'\uD83D\uDCD6 PG Benchmarks',          s:'1980\u20132026 \u00b7 ALL-TIME DATABASE',  b:'8 PGs'},
  {t:'\uD83C\uDFB0 Bet Slip',               s:'MANAGE BETS \u00b7 TRACK P&L',            b:''},
  {t:'\uD83D\uDD27 Settings',               s:'RISK LIMITS \u00b7 AGENT CONFIG',         b:''},
];
const RENDERERS=[renderProps,renderGames,renderModel,renderStats,renderHistory,renderSlip,renderSettings];

function renderCurrentTab(){
  document.getElementById('content').innerHTML=RENDERERS[currentTab]();
  updateSlipBadge();
}

function setTab(i){
  currentTab=i;
  const h=TAB_HEADERS[i];
  document.getElementById('hdr-title').textContent=h.t;
  document.getElementById('hdr-sub').textContent=h.s;
  document.getElementById('hdr-badge').textContent=h.b;
  for(let j=0;j<7;j++){
    document.getElementById('ni'+j).className='nav-icon'+(j===i?' active':'');
    document.getElementById('nl'+j).className='nav-lbl'+(j===i?' active':'');
  }
  renderCurrentTab();
}

function updateSummaryBar(){
  const gradeA=RESULTS.filter(r=>r.result.grade==='A').length;
  const avgEdge=(RESULTS.reduce((s,r)=>s+r.result.edgePct,0)/RESULTS.length).toFixed(1);
  document.getElementById('sum-a').textContent=gradeA;
  document.getElementById('sum-edge').textContent=(avgEdge>=0?'+':'')+avgEdge+'%';
}

function updateClock(){
  const now=new Date();
  let h=now.getHours(),m=now.getMinutes();
  const ampm=h>=12?'PM':'AM';
  h=h%12||12;
  document.getElementById('status-time').textContent=h+':'+(m<10?'0':'')+m+' '+ampm;
}
setInterval(updateClock,30000);
updateClock();

document.addEventListener('DOMContentLoaded',()=>{
  updateSummaryBar();
  setTab(0);
  updateSlipBadge();
});
</script>
</body>
</html>
